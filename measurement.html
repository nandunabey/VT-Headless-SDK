<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVE Tracker — Measurement</title>
<style>
  :root {
    --bg:     #0a0a0a;
    --panel:  #111111;
    --border: #1e1e1e;
    --cyan:   #00ffcc;
    --amber:  #ffaa00;
    --red:    #ff4444;
    --green:  #00e676;
    --text:   #cccccc;
    --muted:  #888888;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: monospace;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 46px 1fr 190px 30px;
    grid-template-columns: 290px 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
  }
  .h-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
  .h-title em { color: var(--cyan); font-style: normal; }
  .h-sep { flex: 1; }
  .conn-status { display: flex; align-items: center; gap: 6px; font-size: 10px; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
  .conn-dot.live         { background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2s infinite; }
  .conn-dot.reconnecting { background: var(--amber); animation: blink .5s infinite; }
  .conn-dot.disconnected { background: var(--red); }
  .conn-dot.waiting      { background: var(--muted); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  .h-back {
    font-size: 9px; color: var(--muted); text-decoration: none; letter-spacing: 1px;
    padding: 4px 8px; border: 1px solid var(--border); border-radius: 2px;
    transition: color .2s, border-color .2s;
  }
  .h-back:hover { color: var(--cyan); border-color: var(--cyan); }

  /* ── Left column — tracker list ── */
  .left-col {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-hdr {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #fff;
    padding: 11px 14px 9px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-hint { font-size: 8px; color: var(--muted); text-transform: none; letter-spacing: 0; }
  .trk-list { flex: 1; overflow-y: auto; padding: 8px; }
  .trk-list::-webkit-scrollbar { width: 3px; }
  .trk-list::-webkit-scrollbar-thumb { background: var(--border); }

  .trk-card {
    border: 1px solid var(--border); border-radius: 3px; padding: 9px 10px;
    margin-bottom: 6px; cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .trk-card:hover       { border-color: #333; background: #141414; }
  .trk-card.selected    { border-color: var(--cyan) !important; background: rgba(0,255,204,.04); }
  .trk-card.lost        { opacity: .5; cursor: default; }
  .trk-card.lost:hover  { border-color: var(--border); background: transparent; }

  .tc-top { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .tc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tc-name { font-size: 12px; color: #fff; letter-spacing: 1px; flex: 1; }
  .tc-role { font-size: 9px; color: var(--cyan); letter-spacing: .5px; }
  .tc-badge {
    font-size: 8px; padding: 1px 5px; border-radius: 2px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-tracking { background: rgba(0,230,118,.1); border: 1px solid var(--green); color: var(--green); }
  .badge-lost     { background: rgba(255,68,68,.1);  border: 1px solid var(--red);  color: var(--red); }
  .sel-chip {
    font-size: 9px; background: var(--cyan); color: #000;
    border-radius: 50%; width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-weight: bold;
  }
  .tc-serial { font-size: 9px; color: var(--muted); margin-bottom: 4px; letter-spacing: .5px; }
  .tc-pos    { font-size: 9px; color: var(--text); display: flex; gap: 8px; }
  .tc-ax     { color: var(--muted); }

  /* ── Right column — measurements ── */
  .right-col { display: flex; flex-direction: column; overflow: hidden; }
  .meas-hdr {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #fff;
    padding: 11px 18px 9px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .meas-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .meas-empty { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 1px; line-height: 2; }

  /* big primary value */
  .big-val  { font-size: 68px; color: var(--cyan); text-align: center; line-height: 1; margin: 6px 0 2px; }
  .big-unit { font-size: 28px; color: var(--muted); }
  .big-sub  { font-size: 15px; color: #666; text-align: center; margin-bottom: 10px; }
  .trk-lbl  { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 8px; }
  .trk-lbl b { color: #fff; }

  .sec-sep   { width: 100%; max-width: 400px; border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .sec-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 6px; }

  .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; width: 100%; max-width: 380px; }
  .pos-cell { background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px; padding: 8px; text-align: center; }
  .pos-axis { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 3px; }
  .pos-val  { font-size: 16px; color: var(--text); font-weight: 500; }

  .mm-row { display: flex; gap: 20px; font-size: 11px; color: var(--muted); margin: 6px 0; }
  .mm-row b { color: var(--text); }

  .dist-table { width: 100%; max-width: 360px; margin-bottom: 14px; }
  .dist-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .dist-lbl { color: var(--muted); }
  .dist-v   { color: var(--text); font-weight: 500; }

  /* ── History ── */
  .history-col {
    grid-column: 1 / -1;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .history-hdr {
    display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .history-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #fff; flex: 1; }
  .btn-sm {
    font-size: 9px; padding: 3px 9px; border: 1px solid var(--border);
    border-radius: 2px; background: transparent; color: var(--muted); cursor: pointer;
    letter-spacing: 1px; transition: color .15s, border-color .15s;
  }
  .btn-sm:hover { color: var(--text); border-color: #444; }
  .history-log { flex: 1; overflow-y: auto; padding: 4px 14px; font-size: 10px; color: var(--muted); line-height: 1.9; }
  .history-log::-webkit-scrollbar { width: 3px; }
  .history-log::-webkit-scrollbar-thumb { background: var(--border); }
  .hist-row { display: flex; gap: 12px; }
  .hist-time { color: #444; flex-shrink: 0; min-width: 75px; }
  .hist-v    { color: var(--text); }

  /* ── Status bar ── */
  .statusbar {
    grid-column: 1 / -1;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 16px;
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
  }
  .sb-item { display: flex; align-items: center; gap: 5px; }
  .sb-v    { color: var(--text); font-weight: 500; }
  .sb-sep  { flex: 1; }
  .sb-msg  { transition: color .3s; }
  .sb-msg.ok  { color: var(--green); }
  .sb-msg.err { color: var(--red); }

  /* ── Banner stack ── */
  #banner-stack { position: fixed; top: 46px; left: 0; right: 0; z-index: 1000; display: flex; flex-direction: column; pointer-events: none; }
  .banner { display: flex; align-items: flex-start; gap: 12px; padding: 12px 20px; font-size: 14px; font-weight: bold; color: #ffffff; pointer-events: all; line-height: 1.5; white-space: pre-wrap; }
  .banner.error   { background: #ff4444; }
  .banner.warning { background: #ffaa00; }
  .banner.success { background: #00aa66; }
  .banner-msg  { flex: 1; }
  .banner-close { background: none; border: none; color: #fff; font-size: 18px; line-height: 1; cursor: pointer; padding: 0; opacity: .8; flex-shrink: 0; font-weight: bold; }
  .banner-close:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="h-title">VIVE <em>TRACKER</em> — MEASUREMENT</div>
  <div class="h-sep"></div>
  <div class="conn-status">
    <div class="conn-dot waiting" id="conn-dot"></div>
    <span id="conn-text" style="color:var(--muted)">WAITING</span>
    <span style="color:#444;font-size:9px">&nbsp;ws://localhost:8765</span>
  </div>
  <a href="http://localhost:8080/visualiser.html" class="h-back">← VISUALISER</a>
</header>

<div class="left-col">
  <div class="panel-hdr">
    LIVE TRACKERS
    <span class="panel-hint">click to select · max 3</span>
  </div>
  <div class="trk-list" id="trk-list">
    <div style="text-align:center;padding:28px 0;font-size:10px;color:var(--muted)">Waiting for tracker data…</div>
  </div>
</div>

<div class="right-col">
  <div class="meas-hdr">MEASUREMENTS</div>
  <div class="meas-body" id="meas-body">
    <div class="meas-empty">Select trackers on the left<br>to begin measuring</div>
  </div>
</div>

<div class="history-col">
  <div class="history-hdr">
    <span class="history-title">HISTORY</span>
    <button class="btn-sm" onclick="copyLast()">📋 COPY</button>
    <button class="btn-sm" onclick="saveCSV()">💾 SAVE</button>
    <button class="btn-sm" onclick="clearHistory()">🗑 CLEAR</button>
  </div>
  <div class="history-log" id="history-log">
    <span style="color:#333">No measurements yet.</span>
  </div>
</div>

<div class="statusbar">
  <div class="sb-item">STREAM <span class="sb-v" id="sb-fps">— fps</span></div>
  <div class="sb-item">FRAMES <span class="sb-v" id="sb-frames">—</span></div>
  <div class="sb-item">TRACKERS <span class="sb-v" id="sb-trackers">0</span></div>
  <div class="sb-sep"></div>
  <span class="sb-msg" id="sb-msg"></span>
</div>

<script>
const WS_URL      = 'ws://localhost:8765';
const HTTP_BASE   = 'http://localhost:8080';
const SMOOTH      = 5;
const SLOT_COLORS = ['#00ffcc', '#ffaa00', '#ff4444', '#4a9eff'];

// ── State ─────────────────────────────────────────────────────────────────────
const trackers = new Map(); // serial → tracker obj
let slotIndex  = 0;
let roles      = {};

let selected   = [];   // ordered array of serials, max 3
let firstDist  = null; // baseline distance for delta (2-tracker mode)
let minDist = null, maxDist = null;
let minAngle = null, maxAngle = null;
let lastSelKey = '';   // string key to detect when panel needs full rebuild

let historyLog = [];
let lastLogMs  = 0;
let frameCount = 0;

// ── Roles ─────────────────────────────────────────────────────────────────────
async function loadRoles() {
  try {
    const r = await fetch(HTTP_BASE + '/tracker_roles.json');
    if (r.ok) { roles = await r.json(); buildTrackerList(); }
  } catch { }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, wsRetries = 0;

function setConn(s) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'conn-dot ' + s;
  const map = {
    live:         ['LIVE',          'var(--green)'],
    reconnecting: ['RECONNECTING…', 'var(--amber)'],
    disconnected: ['DISCONNECTED',  'var(--muted)'],
    waiting:      ['WAITING',       'var(--muted)'],
  };
  const [l, c] = map[s] || map.waiting;
  txt.textContent = l; txt.style.color = c;
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { wsRetries = 0; setConn('live'); };
  ws.onclose = () => {
    setConn(wsRetries > 0 ? 'reconnecting' : 'disconnected');
    wsRetries++;
    setTimeout(connect, 2000);
  };
  ws.onerror = () => setConn('reconnecting');
  ws.onmessage = e => {
    let d; try { d = JSON.parse(e.data); } catch { return; }
    if (!d.type && d.meta !== undefined) ingestPoses(d);
  };
}

function ingestPoses(d) {
  const now = performance.now();
  frameCount++;
  let activeCount = 0, listChanged = false;

  for (const [serial, entry] of Object.entries(d)) {
    if (serial === 'meta' || !entry?.position) continue;
    activeCount++;

    let trk = trackers.get(serial);
    if (!trk) {
      const slot = slotIndex++;
      trk = {
        serial, slot,
        color: SLOT_COLORS[slot % SLOT_COLORS.length],
        name:  'VUT-' + String(slot + 1).padStart(2, '0'),
        pos:   { x: 0, y: 0, z: 0 },
        status: 'tracking',
        posBuffer: [],
        lastNow: now,
        velocity: 0,
      };
      trackers.set(serial, trk);
      listChanged = true;
    }

    const prev = { ...trk.pos };
    trk.pos    = { x: entry.position.x, y: entry.position.y, z: entry.position.z };
    if (trk.status !== 'tracking') { trk.status = 'tracking'; listChanged = true; }

    trk.posBuffer.push({ ...trk.pos });
    if (trk.posBuffer.length > SMOOTH) trk.posBuffer.shift();

    const dt = (now - trk.lastNow) / 1000;
    if (dt > 0 && dt < 1) {
      const dx = (trk.pos.x - prev.x) * 1000;
      const dy = (trk.pos.y - prev.y) * 1000;
      const dz = (trk.pos.z - prev.z) * 1000;
      const speed = Math.sqrt(dx*dx + dy*dy + dz*dz) / dt;
      trk.velocity = trk.velocity * 0.75 + speed * 0.25;
    }
    trk.lastNow = now;
  }

  for (const [serial, trk] of trackers) {
    if ((!d[serial] || d[serial] === d.meta) && trk.status !== 'lost') {
      trk.status = 'lost'; listChanged = true;
    }
  }

  if (listChanged) buildTrackerList();
  else             updateCardPositions();

  updateMeasurements();

  const meta = d.meta || {};
  document.getElementById('sb-fps').textContent      = (meta.fps ?? '—') + ' fps';
  document.getElementById('sb-frames').textContent   = frameCount.toLocaleString();
  document.getElementById('sb-trackers').textContent = activeCount;
}

// ── Tracker list ──────────────────────────────────────────────────────────────
function buildTrackerList() {
  const list = document.getElementById('trk-list');
  if (!trackers.size) {
    list.innerHTML = '<div style="text-align:center;padding:28px 0;font-size:10px;color:var(--muted)">Waiting for tracker data…</div>';
    return;
  }
  list.innerHTML = '';
  const selMap = {};
  selected.forEach((s, i) => selMap[s] = i + 1);

  for (const [serial, trk] of trackers) {
    const role = roles[serial] || '';
    const isSel = !!selMap[serial];
    const isLost = trk.status === 'lost';
    const { x, y, z } = trk.pos;
    const el = document.createElement('div');
    el.className = 'trk-card' + (isSel ? ' selected' : '') + (isLost ? ' lost' : '');
    if (!isLost) el.onclick = () => toggleSelect(serial);
    el.innerHTML = `
      <div class="tc-top">
        <div class="tc-dot" style="background:${trk.color};box-shadow:0 0 4px ${trk.color}88"></div>
        <div class="tc-name">${trk.name}</div>
        ${role ? `<div class="tc-role">${esc(role)}</div>` : ''}
        ${isSel ? `<div class="sel-chip">${selMap[serial]}</div>` : ''}
        <div class="tc-badge ${isLost ? 'badge-lost' : 'badge-tracking'}">${isLost ? 'LOST' : 'TRACKING'}</div>
      </div>
      <div class="tc-serial">Serial: ${serial}</div>
      <div class="tc-pos" id="tcpos-${serial}">
        <span><span class="tc-ax">X</span> ${fmtXYZ(x)}</span>
        <span><span class="tc-ax">Y</span> ${fmtXYZ(y)}</span>
        <span><span class="tc-ax">Z</span> ${fmtXYZ(z)}</span>
      </div>`;
    list.appendChild(el);
  }
}

function updateCardPositions() {
  for (const [serial, trk] of trackers) {
    const el = document.getElementById('tcpos-' + serial);
    if (!el) { buildTrackerList(); return; }
    const { x, y, z } = trk.pos;
    el.innerHTML = `
      <span><span class="tc-ax">X</span> ${fmtXYZ(x)}</span>
      <span><span class="tc-ax">Y</span> ${fmtXYZ(y)}</span>
      <span><span class="tc-ax">Z</span> ${fmtXYZ(z)}</span>`;
  }
}

// ── Selection ─────────────────────────────────────────────────────────────────
function toggleSelect(serial) {
  const trk = trackers.get(serial);
  if (!trk || trk.status === 'lost') return;
  const idx = selected.indexOf(serial);
  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    if (selected.length >= 3) { showMsg('Max 3 trackers', ''); return; }
    selected.push(serial);
  }
  // Reset session stats whenever selection changes
  firstDist = null;
  minDist = null; maxDist = null;
  minAngle = null; maxAngle = null;
  lastSelKey = '';
  buildTrackerList();
  updateMeasurements();
}

// ── Geometry ──────────────────────────────────────────────────────────────────
function smoothPos(serial) {
  const trk = trackers.get(serial);
  if (!trk?.posBuffer.length) return null;
  const n = trk.posBuffer.length;
  let x = 0, y = 0, z = 0;
  for (const p of trk.posBuffer) { x += p.x; y += p.y; z += p.z; }
  return { x: x/n, y: y/n, z: z/n };
}

function dist3(a, b) {
  const dx = a.x-b.x, dy = a.y-b.y, dz = a.z-b.z;
  return Math.sqrt(dx*dx + dy*dy + dz*dz);
}

function distOrigin(p) {
  return Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
}

function angleAtB(a, b, c) {
  const bax = a.x-b.x, bay = a.y-b.y, baz = a.z-b.z;
  const bcx = c.x-b.x, bcy = c.y-b.y, bcz = c.z-b.z;
  const dot  = bax*bcx + bay*bcy + baz*bcz;
  const magA = Math.sqrt(bax*bax + bay*bay + baz*baz);
  const magC = Math.sqrt(bcx*bcx + bcy*bcy + bcz*bcz);
  if (magA < 1e-9 || magC < 1e-9) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot/(magA*magC)))) * 180/Math.PI;
}

function fmtXYZ(v) { return (v >= 0 ? '+' : '') + v.toFixed(3) + 'm'; }
function fmtM(v)   { return v.toFixed(3) + ' m'; }
function fmtCm(v)  { return (v * 100).toFixed(1) + ' cm'; }
function fmtDeg(v) { return v.toFixed(1) + '°'; }
function fmtMm(v)  { return (v >= 0 ? '+' : '') + (v * 1000).toFixed(1) + 'mm'; }
function esc(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Measurement panel ─────────────────────────────────────────────────────────
function updateMeasurements() {
  const body = document.getElementById('meas-body');
  if (selected.length === 0) {
    if (lastSelKey !== '0') {
      body.innerHTML = '<div class="meas-empty">Select trackers on the left<br>to begin measuring</div>';
      lastSelKey = '0';
    }
    return;
  }

  const allOk = selected.every(s => trackers.get(s)?.status === 'tracking');
  if (!allOk) {
    if (lastSelKey !== 'lost') {
      body.innerHTML = '<div class="meas-empty" style="color:var(--red)">Selected tracker(s) not tracking</div>';
      lastSelKey = 'lost';
    }
    return;
  }

  const n = selected.length;
  if (n === 1) update1(body, selected[0]);
  else if (n === 2) update2(body, selected[0], selected[1]);
  else              update3(body, selected[0], selected[1], selected[2]);
}

/* ── 1 tracker ── */
function update1(body, sA) {
  const tA  = trackers.get(sA);
  const pos = smoothPos(sA) || tA.pos;
  const d   = distOrigin(pos);
  const vel = tA.velocity;

  if (lastSelKey !== '1') {
    body.innerHTML = `
      <div style="width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center">
        <div class="trk-lbl" id="m1-lbl"></div>
        <div class="pos-grid">
          <div class="pos-cell"><div class="pos-axis">X</div><div class="pos-val" id="m1-x">—</div></div>
          <div class="pos-cell"><div class="pos-axis">Y</div><div class="pos-val" id="m1-y">—</div></div>
          <div class="pos-cell"><div class="pos-axis">Z</div><div class="pos-val" id="m1-z">—</div></div>
        </div>
        <hr class="sec-sep">
        <div class="sec-label">Distance from origin</div>
        <div class="big-val" id="m1-dist">—<span class="big-unit"> m</span></div>
        <div class="big-sub" id="m1-cm">—</div>
        <hr class="sec-sep">
        <div class="sec-label">Velocity</div>
        <div class="big-val" id="m1-vel" style="font-size:52px;color:var(--amber)">—<span class="big-unit" style="font-size:22px"> mm/s</span></div>
      </div>`;
    lastSelKey = '1';
  }

  document.getElementById('m1-lbl').innerHTML =
    `<span style="color:${tA.color}">●</span> <b>${tA.name}</b>${roles[sA] ? ' — ' + esc(roles[sA]) : ''}`;
  document.getElementById('m1-x').textContent    = fmtXYZ(pos.x);
  document.getElementById('m1-y').textContent    = fmtXYZ(pos.y);
  document.getElementById('m1-z').textContent    = fmtXYZ(pos.z);
  document.getElementById('m1-dist').innerHTML   = d.toFixed(3) + '<span class="big-unit"> m</span>';
  document.getElementById('m1-cm').textContent   = fmtCm(d);
  document.getElementById('m1-vel').innerHTML    = vel.toFixed(1) + '<span class="big-unit" style="font-size:22px"> mm/s</span>';

  autoLog(`${tA.name}  pos=(${fmtXYZ(pos.x)}, ${fmtXYZ(pos.y)}, ${fmtXYZ(pos.z)})  dist=${fmtM(d)}  vel=${vel.toFixed(1)}mm/s`);
}

/* ── 2 trackers ── */
function update2(body, sA, sB) {
  const tA = trackers.get(sA), tB = trackers.get(sB);
  const pA = smoothPos(sA) || tA.pos;
  const pB = smoothPos(sB) || tB.pos;
  const d  = dist3(pA, pB);

  if (firstDist === null) firstDist = d;
  if (minDist === null || d < minDist) minDist = d;
  if (maxDist === null || d > maxDist) maxDist = d;

  if (lastSelKey !== '2') {
    body.innerHTML = `
      <div style="text-align:center;width:100%;max-width:400px">
        <div class="trk-lbl" id="m2-lbl"></div>
        <div class="big-val" id="m2-dist">—<span class="big-unit"> m</span></div>
        <div class="big-sub" id="m2-cm">—</div>
        <div class="mm-row" style="justify-content:center" id="m2-mm">
          <span>Min <b>—</b></span><span>Max <b>—</b></span>
        </div>
        <div style="font-size:12px;color:var(--muted)">
          Δ from start: <span id="m2-delta" style="color:var(--amber)">—</span>
        </div>
      </div>`;
    lastSelKey = '2';
  }

  const delta    = d - firstDist;
  const deltaCol = Math.abs(delta) < 0.0005 ? 'var(--muted)' : delta > 0 ? 'var(--amber)' : 'var(--cyan)';

  document.getElementById('m2-lbl').innerHTML =
    `<span style="color:${tA.color}">●</span> <b>${tA.name}</b> &nbsp;↔&nbsp; <span style="color:${tB.color}">●</span> <b>${tB.name}</b>`;
  document.getElementById('m2-dist').innerHTML = d.toFixed(3) + '<span class="big-unit"> m</span>';
  document.getElementById('m2-cm').textContent = fmtCm(d);
  document.getElementById('m2-mm').innerHTML   =
    `<span>Min <b>${fmtM(minDist)}</b></span><span>Max <b>${fmtM(maxDist)}</b></span>`;
  const dEl = document.getElementById('m2-delta');
  dEl.textContent = fmtMm(delta);
  dEl.style.color = deltaCol;

  autoLog(`${tA.name} ↔ ${tB.name}  ${fmtM(d)}  (${fmtCm(d)})`);
}

/* ── 3 trackers ── */
function update3(body, sA, sB, sC) {
  const tA = trackers.get(sA), tB = trackers.get(sB), tC = trackers.get(sC);
  const pA = smoothPos(sA) || tA.pos;
  const pB = smoothPos(sB) || tB.pos;
  const pC = smoothPos(sC) || tC.pos;
  const dAB  = dist3(pA, pB);
  const dBC  = dist3(pB, pC);
  const dAC  = dist3(pA, pC);
  const ang  = angleAtB(pA, pB, pC);

  if (minAngle === null || ang < minAngle) minAngle = ang;
  if (maxAngle === null || ang > maxAngle) maxAngle = ang;

  if (lastSelKey !== '3') {
    body.innerHTML = `
      <div style="text-align:center;width:100%;max-width:380px">
        <div class="dist-table">
          <div class="dist-row">
            <span class="dist-lbl" id="m3-lAB"></span>
            <span class="dist-v"   id="m3-dAB">—</span>
          </div>
          <div class="dist-row">
            <span class="dist-lbl" id="m3-lBC"></span>
            <span class="dist-v"   id="m3-dBC">—</span>
          </div>
          <div class="dist-row">
            <span class="dist-lbl" id="m3-lAC"></span>
            <span class="dist-v"   id="m3-dAC">—</span>
          </div>
        </div>
        <div class="sec-label">Angle at <span id="m3-b-name" style="color:var(--amber)"></span></div>
        <div class="big-val" id="m3-ang" style="color:var(--amber)">—<span class="big-unit">°</span></div>
        <div class="mm-row" style="justify-content:center" id="m3-mm">
          <span>Min <b>—</b></span><span>Max <b>—</b></span>
        </div>
      </div>`;
    lastSelKey = '3';
  }

  document.getElementById('m3-lAB').innerHTML = colorDot(tA) + ` ${tA.name} ↔ ` + colorDot(tB) + ` ${tB.name}`;
  document.getElementById('m3-lBC').innerHTML = colorDot(tB) + ` ${tB.name} ↔ ` + colorDot(tC) + ` ${tC.name}`;
  document.getElementById('m3-lAC').innerHTML = colorDot(tA) + ` ${tA.name} ↔ ` + colorDot(tC) + ` ${tC.name}`;
  document.getElementById('m3-dAB').textContent  = fmtM(dAB);
  document.getElementById('m3-dBC').textContent  = fmtM(dBC);
  document.getElementById('m3-dAC').textContent  = fmtM(dAC);
  document.getElementById('m3-b-name').textContent = tB.name;
  document.getElementById('m3-ang').innerHTML    = ang.toFixed(1) + '<span class="big-unit">°</span>';
  document.getElementById('m3-mm').innerHTML     =
    `<span>Min <b>${fmtDeg(minAngle)}</b></span><span>Max <b>${fmtDeg(maxAngle)}</b></span>`;

  autoLog(`${tA.name}↔${tB.name} ${fmtM(dAB)}  ${tB.name}↔${tC.name} ${fmtM(dBC)}  ${tA.name}↔${tC.name} ${fmtM(dAC)}  ∠${tB.name}=${fmtDeg(ang)}`);
}

function colorDot(trk) {
  return `<span style="color:${trk.color}">●</span>`;
}

// ── History ───────────────────────────────────────────────────────────────────
function autoLog(text) {
  const now = Date.now();
  if (now - lastLogMs < 1000) return;
  lastLogMs = now;
  historyLog.push({ ts: new Date().toLocaleTimeString(), text });
  if (historyLog.length > 200) historyLog.shift();
  const el = document.getElementById('history-log');
  el.innerHTML = historyLog.map(e =>
    `<div class="hist-row"><span class="hist-time">${e.ts}</span><span class="hist-v">${esc(e.text)}</span></div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}

function copyLast() {
  if (!historyLog.length) { showMsg('Nothing to copy', 'err'); return; }
  const e = historyLog[historyLog.length - 1];
  navigator.clipboard.writeText(`${e.ts}  ${e.text}`).then(() => showMsg('Copied', 'ok'));
}

function saveCSV() {
  if (!historyLog.length) { showMsg('No data to save', 'err'); return; }
  const rows = ['timestamp,measurement',
    ...historyLog.map(e => `"${e.ts}","${e.text.replace(/"/g, '""')}"`)];
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([rows.join('\n')], { type: 'text/csv' }));
  a.download = 'vut_measurement_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.csv';
  a.click(); URL.revokeObjectURL(a.href);
  showMsg('Saved CSV', 'ok');
}

function clearHistory() {
  historyLog = [];
  document.getElementById('history-log').innerHTML = '<span style="color:#333">No measurements yet.</span>';
}

function showBanner(msg, type) {
  const stack = document.getElementById('banner-stack');
  const el    = document.createElement('div');
  el.className = 'banner ' + type;
  const msgEl = document.createElement('div');
  msgEl.className  = 'banner-msg';
  msgEl.textContent = msg;
  const close = document.createElement('button');
  close.className  = 'banner-close';
  close.textContent = '✕';
  el.appendChild(msgEl);
  el.appendChild(close);
  stack.appendChild(el);
  const dur   = type === 'success' ? 3000 : 8000;
  const timer = setTimeout(() => el.remove(), dur);
  close.onclick = () => { clearTimeout(timer); el.remove(); };
}
function showMsg(msg, cls) {
  showBanner(msg, cls === 'ok' ? 'success' : cls === 'err' ? 'error' : 'warning');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadRoles();
connect();
</script>
<div id="banner-stack"></div>
</body>
</html>
